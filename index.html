            font-weight: 500;
            color: #289672;
        }

            margin-bottom: 12px;
            font-size: 15px;

            color: #475569;
        }

            margin-bottom: 16px;
            font-size: 14px;
            color: #1e6f5c;

</head>

    // ========== 模糊匹配（子串，最多50条） ==========
    function findChemicalByInput(inputStr) {
        if (!inputStr || inputStr.trim() === "") return [];
        const query = inputStr.trim().toLowerCase();
        const results = [];
        for (let chem of chemicalsData) {
            if (results.length >= 50) break;
            const chn = chem.basic.chineseName.toLowerCase();
            const eng = chem.basic.englishName.toLowerCase();
            const cas = chem.basic.cas.toLowerCase();
            if (chn.includes(query) || eng.includes(query) || cas.includes(query)) {
                results.push(chem);
            }
        }
        return results;
    }

    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 安全获取嵌套属性
    function getSafe(obj, path, defaultValue = "无数据") {
        const keys = path.split('.');
        let val = obj;
        for (let k of keys) {
            if (val === undefined || val === null) return defaultValue;
            val = val[k];
        }
        return (val === undefined || val === null) ? defaultValue : val;
    }

    function performSearch() {
        const inputEl = document.getElementById("chemicalInput");
        const query = inputEl.value.trim();
        const container = document.getElementById("resultContainer");
        if (query === "") {
            container.innerHTML = `<div class="empty-state">🔍 请输入化学品名称、CAS号或英文名进行查询</div>`;
            return;
        }
        const results = findChemicalByInput(query);
        if (results.length === 0) {
            container.innerHTML = `<div class="error-message">❌ 未找到与 "${escapeHtml(query)}" 相关的化学品</div><div class="empty-state">📖 提示：支持部分匹配，如“甲醇”可匹配“甲醇”和“苯甲醇”</div>`;
            return;
        }
        let headerHtml = `<div class="result-header">🔎 找到 ${results.length} 条相关化学品 ${results.length >= 50 ? "(已达显示上限50条)" : ""}</div>`;
        let cardsHtml = "";
        for (let i = 0; i < results.length; i++) {
            cardsHtml += renderChemicalCard(results[i]);
            if (i < results.length - 1) cardsHtml += `<div style="height: 6px;"></div>`;
        }
        container.innerHTML = headerHtml + cardsHtml;
        container.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    document.addEventListener("DOMContentLoaded", function() {
        const btn = document.getElementById("searchBtn");
        const input = document.getElementById("chemicalInput");
        btn.addEventListener("click", performSearch);
        input.addEventListener("keypress", function(e) {
            if (e.key === "Enter") performSearch();
        });
        // 初始提示
        console.log("页面已加载，化学品数量:", chemicalsData.length);
    });
